name: Build and Push to ECR
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}
    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v1
    - name: Build Docker image
      run: docker build -t webhook-api .
    - name: Tag image
      run: docker tag webhook-api:latest 045230653823.dkr.ecr.eu-north-1.amazonaws.com/webhook-api:latest
    - name: Push image
      run: docker push 045230653823.dkr.ecr.eu-north-1.amazonaws.com/webhook-api:latest
    - name: Trigger Instance Refresh
      run: |
        aws autoscaling start-instance-refresh \
          --auto-scaling-group-name ASG-API \
          --preferences '{"MinHealthyPercentage": 50}'
